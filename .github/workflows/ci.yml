name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install system dependencies for vl-desktop and the recorder probe
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libwayland-cursor0 \
            libwayland-egl1 \
            libdbus-1-dev \
            libgl1-mesa-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            alsa-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync Python dev environment
        run: uv sync --group dev

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --all-targets --all-features -- -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test --all
        run: cargo test --all

      - name: uv run ruff check python tests/python
        run: uv run ruff check python tests/python

      - name: uv run ruff format --check python tests/python
        run: uv run ruff format --check python tests/python

      - name: uv run pytest -q tests/python
        run: uv run pytest -q tests/python
