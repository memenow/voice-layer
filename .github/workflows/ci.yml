name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install system dependencies for vl-desktop and the recorder probe
        # The Azure apt mirror on hosted runners occasionally stalls on
        # `Ign:` responses and drags `apt-get update` past the job
        # timeout (observed 2026-04-22, run 24774249846). Cap per-request
        # HTTP(S) timeouts and wrap update + install in a bounded retry
        # so a dead mirror fails fast and we get a second chance to pick
        # up a healthy one.
        run: |
          set -euo pipefail
          apt_opts=(
            -o Acquire::Retries=3
            -o Acquire::http::Timeout=30
            -o Acquire::https::Timeout=30
          )
          run_with_retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              echo "::warning::apt command failed on attempt ${attempt}: $*" >&2
              sleep $((attempt * 15))
            done
            echo "::error::apt command failed after 3 attempts: $*" >&2
            return 1
          }
          run_with_retry sudo apt-get "${apt_opts[@]}" update
          run_with_retry sudo apt-get "${apt_opts[@]}" install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libwayland-cursor0 \
            libwayland-egl1 \
            libdbus-1-dev \
            libgl1-mesa-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            alsa-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync Python dev environment
        run: uv sync --group dev

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --all-targets --all-features -- -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test --all
        run: cargo test --all

      - name: uv run ruff check python tests/python
        run: uv run ruff check python tests/python

      - name: uv run ruff format --check python tests/python
        run: uv run ruff format --check python tests/python

      - name: uv run pytest -q tests/python
        run: uv run pytest -q tests/python
